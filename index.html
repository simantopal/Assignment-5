<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

</head>
<body class="bg-[#F8FAFC]">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-sm mb-14 px-5 md:px-20">
        <div class="flex flex-1 gap-1">
            <img class="w-9" src="./assets/github-logo.png" alt="">
            <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2 ">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..."/>
            </label>

            <button class="btn btn-primary font-semibold"><i class="fa-solid fa-plus"></i>New Issue</button>
        </div>       
    </div>

    <section class="w-8/12 mx-auto">
        <div class="flex bg-white rounded-lg shadow py-6 px-6 gap-4 mb-6">
            <button id="allBtn" onclick="filterIssues('all')" class="btn btn-active">All</button>
            <button id="openBtn" onclick="filterIssues('open')" class="btn">Open</button>
            <button id="closedBtn" onclick="filterIssues('closed')" class="btn">Closed</button>
        </div>
    </section>

    <section class="w-8/12 mx-auto">
        <div class="bg-white rounded-lg p-4 shadow mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                    <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                    <h2 class="font-bold text-lg"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>  
            </div>

            <div class="flex gap-4 text-sm">
                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span>Open
                </div>

                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span>Closed
                </div>
            </div>
        </div>
    </section>

    <section id="tab-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-8/12 mx-auto">
        
    </section>

    <script src="script/index.js"></script>

</body>
</html>
